<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>오피스클린프로 - 직원</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20260624">
    <link rel="stylesheet" href="css/staff-mobile.css?v=20260624">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
</head>
<body>

  <!-- 로딩 -->
  <div id="loading"><div class="spinner"></div></div>

  <!-- 앱 -->
  <div id="app" style="display:none">

    <!-- 상단 네비게이션 -->
    <nav class="navbar">
      <h2>오피스클린프로</h2>
      <div class="navbar-right">
        <span id="userName"></span>
        <button class="logout-btn" onclick="logout()">로그아웃</button>
        <button class="profile-btn" onclick="toggleProfileMenu()">👤</button>
        <div class="profile-menu" id="profileMenu">
          <div class="profile-menu-header">
            <div class="profile-menu-name" id="profileName"></div>
            <div class="profile-menu-role">직원</div>
          </div>
          <button class="profile-menu-item danger" onclick="logout()">로그아웃</button>
        </div>
      </div>
    </nav>

    <!-- 직원 탭 -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('todayTasks', this)">오늘 할 일</button>
      <button class="tab" onclick="switchTab('myCompanies', this)">내 업체</button>
      <button class="tab" onclick="switchTab('myPay', this)">내 급여</button>
      <button class="tab" onclick="switchTab('taskHistory', this)">완료기록</button>
      <button class="tab" onclick="switchTab('myRequests', this)">내 요청</button>
      <button class="tab" onclick="switchTab('notices', this)">공지사항</button>
        <button class="tab" onclick="switchTab('chat', this)">채팅</button>
        <button class="tab" onclick="switchTab('supplies', this)">물품요청</button>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="content" id="mainContent"></div>

  </div>

  
    <!-- 하단 네비게이션 -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="bnav-item active" onclick="switchBottomNav('todayTasks', this)">
        <span class="bnav-icon">🏠</span>
        <span class="bnav-label">홈</span>
      </button>
      <button class="bnav-item" onclick="switchBottomNav('myCompanies', this)">
        <span class="bnav-icon">🏢</span>
        <span class="bnav-label">업체</span>
      </button>
      <button class="bnav-item" onclick="switchBottomNav('myPay', this)">
        <span class="bnav-icon">💰</span>
        <span class="bnav-label">급여</span>
      </button>
      <button class="bnav-item" onclick="switchBottomNav('chat', this)">
        <span class="bnav-icon">💬</span>
        <span class="bnav-label">채팅</span>
      </button>
      <button class="bnav-item" onclick="toggleMoreMenu()">
        <span class="bnav-icon">⋯</span>
        <span class="bnav-label">더보기</span>
      </button>
    </nav>

    <!-- 더보기 메뉴 -->
    <div class="more-overlay" id="moreOverlay" onclick="toggleMoreMenu()">
      <div class="more-panel" onclick="event.stopPropagation()">
        <div class="more-handle"></div>
        <div class="more-grid">
          <button class="more-item" onclick="switchFromMore('taskHistory')">
            <span class="more-item-icon">📋</span>
            <span class="more-item-label">출퇴기록</span>
          </button>
          <button class="more-item" onclick="switchFromMore('myRequests')">
            <span class="more-item-icon">📝</span>
            <span class="more-item-label">내 요청</span>
          </button>
          <button class="more-item" onclick="switchFromMore('notices')">
            <span class="more-item-icon">📢</span>
            <span class="more-item-label">공지사항</span>
          </button>
          <button class="more-item" onclick="switchFromMore('supplies')">
            <span class="more-item-icon">📦</span>
            <span class="more-item-label">물품요청</span>
          </button>
        </div>
        <div class="more-divider"></div>
        <button class="more-logout" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <!-- 업체 상세 모달 -->
  <div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalBody"></div>
  </div>

  <!-- 요청 작성 모달 -->
  <div class="modal-overlay" id="requestModal" onclick="if(event.target===this)closeRequestModal()">
    <div class="modal" id="requestModalBody"></div>
  </div>

  <!-- 사진 뷰어 (라이트박스) -->
  <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <img id="lightboxImg" src="" alt="사진">
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <!-- 숨겨진 파일 입력 -->
  <input type="file" id="photoFileInput" accept="image/*" style="display:none" onchange="handlePhotoSelected(event)">

  <!-- 공통 -->
  <script src="js/supabase.js?v=20260623"></script>
  <script src="js/utils.js?v=20260725"></script>

  <!-- 직원 모듈 -->
  <script src="js/staff/staff-core.js?v=20260623"></script>
  <script src="js/staff/staff-today.js?v=20260623"></script>
  <script src="js/staff/staff-companies.js?v=20260623"></script>
  <script src="js/staff/staff-tasks.js?v=20260623"></script>
  <script src="js/staff/staff-pay.js?v=20260623"></script>
  <script src="js/staff/staff-notices.js?v=20260623"></script>
  <script src="js/staff/staff-requests.js?v=20260623"></script>
    <script src="js/staff/staff-chat.js?v=20260621"></script>
    <script src="js/staff/staff-supplies.js?v=20260623"></script>
    <script src="js/chat-notify.js?v=20260621"></script>
  <script src="js/staff/staff-photos.js?v=20260623"></script>
</body>
</html>
